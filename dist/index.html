@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');:root{--ink:#151412;--stone:#211f1b;--taupe:#c7b9a8;--gold:#caa96a;--ivory:#f6f0e7}*{box-sizing:border-box}body{margin:0;background:var(--ink);color:var(--ivory);font-family:Inter,system-ui,sans-serif}button,input{font:inherit}button{cursor:pointer}.hero{min-height:92vh;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:20px;overflow:hidden}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.shade{position:absolute;inset:0;background:linear-gradient(#0008,#15141255,#151412)}.top,.center,.bottom{position:relative;z-index:1}.top{display:flex;justify-content:space-between;gap:12px}.langs{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid #fff4;border-radius:999px;background:#0004;color:var(--ivory);padding:10px 14px;backdrop-filter:blur(12px)}.pill.active,.gold{background:var(--gold);color:var(--ink);border-color:var(--gold)}.center{text-align:center;max-width:820px;margin:auto}.logo{width:116px;height:116px;margin:0 auto 24px;border:1px solid #caa96aaa;border-radius:999px;display:grid;place-items:center;background:#151412bb;color:var(--gold);font:700 42px 'Playfair Display';box-shadow:0 24px 80px #0008}.eyebrow{color:var(--gold);letter-spacing:.45em;text-transform:uppercase;font-size:12px}h1{font:italic 700 clamp(50px,12vw,92px) 'Playfair Display';margin:12px 0}p{color:var(--taupe);line-height:1.7}.venue-switch{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:28px}.bottom{text-align:center;letter-spacing:.35em;text-transform:uppercase;color:#ffffff99;font-size:11px}.wrap{max-width:1160px;margin:auto;padding:32px 16px 96px}.toolbar{position:sticky;top:0;z-index:5;margin:0 -16px;padding:14px 16px;background:#151412dd;border-block:1px solid #caa96a22;backdrop-filter:blur(18px)}.search{display:flex;gap:10px;align-items:center;bor const L=['it','en','fr','de','es'];const tr=(it,en,fr,de,es)=>({it,en,fr,de,es});const badges={recommended:tr('Consigliato','Recommended','Recommandé','Empfohlen','Recomendado'),vegetarian:tr('Vegetariano','Vegetarian','Végétarien','Vegetarisch','Vegetariano'),glutenFree:tr('Gluten Free','Gluten Free','Sans gluten','Glutenfrei','Sin gluten'),spicy:tr('Piccante','Spicy','Épicé','Scharf','Picante')};let lang='it',venue='locanda-22',query='',cat='all',admin=false,unlocked=false,pin='';const venues=[{id:'locanda-22',name:'Locanda 22',slug:'locanda-22',logo:'L22',hero:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1600&q=85',active:true},{id:'adelardi',name:'Adelardi',slug:'adelardi',logo:'A',hero:'https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1600&q=85',active:true}];let categories=[{id:'antipasti-l22',venueId:'locanda-22',name:tr('Antipasti','Starters','Entrées','Vorspeisen','Entrantes'),active:true},{id:'primi-l22',venueId:'locanda-22',name:tr('Primi','Pasta & Risotto','Pâtes & Risotto','Pasta & Risotto','Pasta y Risotto'),active:true},{id:'signature-ade',venueId:'adelardi',name:tr('Signature','Signature','Signature','Signature','Signature'),active:true},{id:'mare-ade',venueId:'adelardi',name:tr('Mare','Sea','Mer','Meer','Mar'),active:true}];let products=[['p1','locanda-22','antipasti-l22',tr('Battuta di Fassona','Fassona tartare','Tartare de Fassona','Fassona-Tatar','Tartar de Fassona'),tr('Nocciole, senape antica e croccante al Parmigiano.','Hazelnuts, old mustard and Parmigiano crisp.','Noisettes, moutarde ancienne et tuile au Parmigiano.','Haselnüsse, alte Senfsaat und Parmigiano-Chip.','Avellanas, mostaza antigua y crujiente de Parmigiano.'),18,'https://images.unsplash.com/photo-1600891964092-4316c288032e?auto=format&fit=crop&w=900&q=80',['recommended','glutenFree'],true],['p2','locanda-22','primi-l22',tr('Risotto oro e zafferano','Gold saffron risotto','Risotto or et safran','Gold-Safran-Ri function money(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n)}function el(s){return document.querySelector(s)}function render(){const v=venues.find(x=>x.id===venue)||venues[0], cats=categories.filter(c=>c.venueId===v.id&&c.active), prods=products.filter(p=>p[1]===v.id&&p[8]&&(cat==='all'||p[2]===cat)&&`${p[3][lang]} ${p[4][lang]}`.toLowerCase().includes(query.toLowerCase()));el('#app').innerHTML=`<header class="hero"><img src="${v.hero}"><div class="shade"></div><div class="top"><div class="langs">${L.map(l=>`<button class="pill ${lang===l?'active':''}" onclick="lang='${l}';render()">${l.toUpperCase()}</button>`).join('')}</div><button class="pill" onclick="admin=true;render()">⚙</button></div><div class="center"><div class="logo">${v.logo}</div><div class="eyebrow">Menu digitale premium</div><h1>${v.name}</h1><p>Esperienza mobile first, multilingua e installabile, pensata per consultare il menu con eleganza e rapidità.</p><div class="venue-switch">${venues.filter(x=>x.active).map(x=>`<button class="pill ${x.id===v.id?'gold':''}" onclick="venue='${x.id}';cat='all';render()">${x.name}</button>`).join('')}</div></div><div class="bottom">Scorri il menu</div></header><section class="wrap"><div class="toolbar"><label class="search">⌕<input placeholder="Cerca prodotti" value="${query}" oninput="query=this.value;render()"></label><div class="filters"><button class="pill ${cat==='all'?'gold':''}" onclick="cat='all';render()">Tutto</button>${cats.map(c=>`<button class="pill ${cat===c.id?'gold':''}" onclick="cat='${c.id}';render()">${c.name[lang]}</button>`).join('')}</div></div><div class="grid">${prods.map(p=>`<article class="card"><img src="${p[6]}"><div class="card-body"><div class="badges">${p[7].map(b=>`<span class="badge">${badges[b][lang]}</span>`).join('')}</div><div class="row"><h3>${p[3][lang]}</h3><div class="price">${money(p[5])}</div></div><p>${p[4][lang]}</p></div></article>`).join('')}</div></section>${admin?adminHtml():''}`}function adminHtml(){if(!unlocked)return`<div class="admin"><div class="panel box" style="max-width:420px;margin-top:12vh"><h2>🔒 Area Admin</h2><input type="password" placeholder="PIN" oninput="pin=this.value"><button class="pill gold" onclick="if(pin==='2222'){unlocked=true;render()}">Accedi</button> <button class="pill" onclick="admin=false;render()">Chiudi</button></div></div>`;return`<div class="admin"><div class="panel"><button class="pill" onclick="admin=false;render()">Chiudi</button><h2>Console admin</h2><p>I locali possono essere creati, modificati e disattivati. Non esiste eliminazione locale.</p><div class="admin-grid">${venues.map((v,i)=>`<div class="box"><input value="${v.name}" onchange="venues[${i}].name=this.value;render()"><input value="${v.hero}" onchange="venues[${i}].hero=this.value;render()"><button class="pill" onclick="venues[${i}].active=!venues[${i}].active;render()">${v.active?'Disattiva':'Attiva'}</button><button class="pill gold" onclick="this.nextElementSibling.classList.toggle('hidden')">QR Code</button><div class="qr hidden">${location.origin}/?locale=${v.slug}</div></div>`).join('')}</div><div class="admin-grid"><div class="box"><h3>Categorie</h3>${categories.map((c,i)=>`<input value="${c.name.it}" onchange="categories[${i}].name.it=this.value;render()">`).join('')}<button class="pill gold" onclick="categories.push({id:crypto.randomUUID(),venueId:venue,name:{it:'Nuova categoria',en:'New category',fr:'Nouvelle catégorie',de:'Neue Kategorie',es:'Nueva categoría'},active:true});render()">Crea categoria</button></div><div class="box"><h3>Prodotti</h3>${products.map((p,i)=>`<input value="${p[3].it}" onchange="products[${i}][3].it=this.value;render()"><input type="number" value="${p[5]}" onchange="products[${i}][5]=Number(this.value);render()"><button class="pill" onclick="products[${i}][8]=!products[${i}][8];render()">${p[8]?'Disattiva':'Attiva'}</button>`).join('')}<button class="pill gold" onclick="products.push([crypto.randomUUID(),venue,categories.find(c=>c.venueId===venue)?.id||'',tr('Nuovo piatto','New dish','Nouveau plat','Neues Gericht','Nuevo plato'),tr('Descrizione','Description','Description','Beschreibung','Descripción'),10,'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=900&q=80',['recommended'],true]);render()">Crea prodotto</button></div></div></div></div>`}render();if('serviceWorker'in navigator) addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
